name: Publish to Kaggle

on:
  schedule:
    # Once a day: the listings store in git is append-only, so the daily
    # export always contains everything scraped so far. (Publishing on every
    # scrape run would create ~240 Kaggle versions per day.)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Publish listings to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_KEY: ${{ secrets.KAGGLE_API_KEY }}
          KAGGLE_DATASET_SLUG: ${{ secrets.KAGGLE_DATASET_SLUG }}
        run: uv run vienna-rentals kaggle
