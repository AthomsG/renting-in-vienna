name: Scraping Pipeline

on:
  schedule:
    # Run every 6 minutes (GitHub's cron is best-effort, so expect longer gaps)
    - cron: "*/6 * * * *"
  workflow_dispatch: # Allows manual triggering of the workflow from the Actions tab

permissions:
  contents: write  # Grants permission to push commits

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Scrape listings
        run: uv run vienna-rentals scrape

      - name: Filter listings to your preferences
        run: uv run vienna-rentals filter

      - name: Update README and notify Telegram
        env:
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: uv run vienna-rentals notify

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Use the GitHub token for authentication
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          commit_output=$(git commit -m "Auto-commit: Generated files after running Python scripts" || true)
          echo "$commit_output"
          if [[ "$commit_output" != *"nothing to commit, working tree clean"* ]]; then
            git push
          else
            echo "No changes to push"
          fi
